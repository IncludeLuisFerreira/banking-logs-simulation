server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 100ms
    batchsize: 1

scrape_configs:
  - job_name: app-logs
    pipeline_stages:
      - json:
          expressions:
            origemId: origemId
            tipo: tipo
      - labels:
          origemId:
          tipo:
    static_configs:
      - targets:
          - localhost
        labels:
          job: banking-simulation
          __path__: /app/logs/*.log
